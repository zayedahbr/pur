<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mon compte — PureSpec</title>
<meta name="description" content="Votre espace client PureSpec : commandes, suivi, profil.">

<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="/css/main.css">

<style>
  .account-hero {
    padding: clamp(48px, 7vw, 80px) 0 24px;
  }
  .account-tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 32px;
  }
  .account-tab {
    padding: 12px 4px;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color var(--t-fast), border-color var(--t-fast);
  }
  .account-tab:hover { color: var(--ink); }
  .account-tab.is-on {
    color: var(--ink);
    border-color: var(--ink);
  }
  .account-tab + .account-tab { margin-left: 24px; }
  .tab-panel { display: none; }
  .tab-panel.is-on { display: block; }

  .order-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: box-shadow var(--t-fast), transform var(--t-fast);
  }
  .order-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .order-card + .order-card { margin-top: 12px; }
  .order-card-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
  }
  .order-num {
    font-family: 'SF Mono', monospace;
    font-size: 13px;
    color: var(--gray);
    letter-spacing: 0.04em;
  }
  .order-title {
    font-size: 16px;
    font-weight: 600;
    margin-top: 4px;
  }
  .order-sub {
    font-size: 13px;
    color: var(--gray);
    margin-top: 2px;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray);
  }
  .empty-icon {
    width: 56px; height: 56px;
    border-radius: var(--radius-full);
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    color: var(--gray);
  }

  /* Détail commande */
  .order-detail {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: clamp(20px, 4vw, 36px);
    box-shadow: var(--shadow-md);
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 32px;
  }
  @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; gap: 20px; } }
  .info-block { padding: 16px 0; border-bottom: 1px solid var(--line-faint); }
  .info-block:last-child { border-bottom: 0; }

  /* Timeline progress */
  .progress-timeline { position: relative; padding-left: 18px; }
  .progress-timeline::before {
    content: ''; position: absolute;
    left: 7px; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--line-soft);
    border-radius: 1px;
  }
  .progress-step {
    position: relative;
    padding: 8px 0 16px;
    padding-left: 18px;
  }
  .progress-step::before {
    content: ''; position: absolute;
    left: -18px; top: 11px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 2px solid var(--line);
  }
  .progress-step.is-done::before {
    background: var(--success);
    border-color: var(--success);
  }
  .progress-step.is-current::before {
    background: var(--ink);
    border-color: var(--ink);
    box-shadow: 0 0 0 4px rgba(29,29,31,0.1);
  }
  .progress-step-title {
    font-size: 14px;
    font-weight: 600;
  }
  .progress-step-sub {
    font-size: 12px;
    color: var(--gray);
    margin-top: 2px;
  }
</style>
</head>
<body>

<div id="nav-slot"></div>

<!-- ÉTAT NON CONNECTÉ : redirige automatiquement -->
<div id="redirecting" style="text-align:center;padding:120px 20px;">
  <span class="spinner"></span>
  <p class="muted mt-4">Chargement…</p>
</div>

<!-- ÉTAT CONNECTÉ -->
<div id="accountView" style="display:none;">

  <section class="account-hero">
    <div class="container">
      <div class="row-between">
        <div>
          <div class="eyebrow">Espace client</div>
          <h1 class="display-3 mt-2">Bonjour<span id="userName"></span>.</h1>
          <p class="body mt-2"><span id="userEmail" class="mono"></span></p>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="logout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Se déconnecter
        </button>
      </div>
    </div>
  </section>

  <section class="section-sm">
    <div class="container">

      <!-- Vue liste (par défaut) -->
      <div id="ordersView">
        <div class="account-tabs">
          <button class="account-tab is-on" data-tab="orders">Mes commandes</button>
          <button class="account-tab" data-tab="profile">Mon profil</button>
        </div>

        <div class="tab-panel is-on" data-panel="orders">
          <div id="ordersList"></div>
        </div>

        <div class="tab-panel" data-panel="profile">
          <div class="card" style="max-width:640px;">
            <form id="profileForm" onsubmit="saveProfile(event)">
              <div class="grid-2">
                <div class="field">
                  <label class="label">Prénom</label>
                  <input class="input" name="prenom" maxlength="100">
                </div>
                <div class="field">
                  <label class="label">Nom</label>
                  <input class="input" name="nom" maxlength="100">
                </div>
              </div>
              <div class="field mt-4">
                <label class="label">Téléphone</label>
                <input class="input" name="telephone" type="tel" maxlength="30">
              </div>
              <div class="field mt-4">
                <label class="label">Adresse</label>
                <input class="input" name="adresse">
              </div>
              <div class="field mt-4">
                <label class="label">Complément</label>
                <input class="input" name="complement">
              </div>
              <div class="grid-2 mt-4">
                <div class="field" style="margin-top:0;">
                  <label class="label">Code postal</label>
                  <input class="input" name="code_postal">
                </div>
                <div class="field" style="margin-top:0;">
                  <label class="label">Ville</label>
                  <input class="input" name="ville">
                </div>
              </div>
              <div class="field mt-4">
                <label class="label">Pays</label>
                <select class="select" name="pays">
                  <option value="France">France</option>
                  <option value="Belgique">Belgique</option>
                  <option value="Suisse">Suisse</option>
                  <option value="Luxembourg">Luxembourg</option>
                </select>
              </div>
              <button class="btn btn-primary mt-6" type="submit">Enregistrer</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Vue détail commande -->
      <div id="detailView" style="display:none;"></div>

    </div>
  </section>
</div>

<div id="footer-slot"></div>

<script>
let currentUser = null;

async function init() {
  // Attendre supabase
  await new Promise(r => setTimeout(r, 250));
  currentUser = await PureSpec.getCurrentUser();
  if (!currentUser) {
    window.location.href = '/account/login';
    return;
  }
  document.getElementById('redirecting').style.display = 'none';
  document.getElementById('accountView').style.display = '';

  // Init listeners tabs
  document.querySelectorAll('.account-tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // URL : si #order-PSXXXXXX dans le hash, ouvrir directement
  const hash = window.location.hash;
  const orderMatch = hash.match(/^#order-(.+)$/);
  if (orderMatch) {
    loadOrderDetail(orderMatch[1]);
  } else {
    loadOrders();
    loadProfile();
  }

  setUserDisplay();
}

function setUserDisplay() {
  if (!currentUser) return;
  document.getElementById('userEmail').textContent = currentUser.email;
}

async function loadOrders() {
  const list = document.getElementById('ordersList');
  list.innerHTML = '<div class="empty"><span class="spinner"></span><p class="muted mt-4">Chargement…</p></div>';

  try {
    const data = await PureSpec.apiRequest('/api/account/orders');
    const orders = data.orders || [];

    if (orders.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          </div>
          <h3 class="title">Aucune commande</h3>
          <p class="body mt-2">Vos commandes apparaîtront ici.</p>
          <a href="/" class="btn btn-primary mt-6">Concevoir mon sticker</a>
        </div>
      `;
      return;
    }

    list.innerHTML = orders.map(o => orderRow(o)).join('');
    list.querySelectorAll('[data-order-ref]').forEach(el => {
      el.addEventListener('click', () => loadOrderDetail(el.dataset.orderRef));
    });
  } catch (err) {
    list.innerHTML = `<div class="empty"><p class="muted">Erreur : ${PureSpec.escapeHtml(err.message)}</p></div>`;
  }
}

function orderRow(o) {
  const info = PureSpecStatus.statusInfo(o.statut);
  return `
    <div class="order-card" data-order-ref="${o.reference}">
      <div class="order-card-row">
        <div>
          <div class="order-num">${PureSpec.escapeHtml(o.order_number)}</div>
          <div class="order-title">${PureSpec.escapeHtml((o.marque||'') + ' ' + (o.modele||''))} <span class="muted" style="font-weight:400;">${PureSpec.escapeHtml(o.type_version || '')}</span></div>
          <div class="order-sub">${PureSpec.formatDate(o.created_at)} · ${PureSpec.formatMoney(o.total_eur)} · Réf <span class="mono">${o.reference}</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="badge ${info.badge}"><span class="badge-dot"></span>${info.short}</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--gray);"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </div>
  `;
}

async function loadOrderDetail(refOrNumber) {
  document.getElementById('ordersView').style.display = 'none';
  const view = document.getElementById('detailView');
  view.style.display = '';
  view.innerHTML = '<div class="empty"><span class="spinner"></span></div>';

  try {
    const data = await PureSpec.apiRequest('/api/account/order/' + encodeURIComponent(refOrNumber));
    renderOrderDetail(data.order, data.events || []);
    window.history.pushState({}, '', '#order-' + refOrNumber);
  } catch (err) {
    view.innerHTML = `<div class="empty"><p class="muted">Erreur : ${PureSpec.escapeHtml(err.message)}</p><button class="btn btn-ghost mt-4" onclick="backToList()">Retour</button></div>`;
  }
}

function renderOrderDetail(o, events) {
  const view = document.getElementById('detailView');
  const info = PureSpecStatus.statusInfo(o.statut);
  const order = PureSpecStatus.STATUS_ORDER;
  const currentIdx = order.indexOf(o.statut);

  // Build progress timeline
  const timeline = order.map((s, i) => {
    const sInfo = PureSpecStatus.statusInfo(s);
    let dateStr = '';
    if (s === 'pending' && o.created_at) dateStr = PureSpec.formatDate(o.created_at);
    if (s === 'paid' && o.paid_at) dateStr = PureSpec.formatDate(o.paid_at);
    if (s === 'shipped' && o.shipped_at) dateStr = PureSpec.formatDate(o.shipped_at);
    if (s === 'delivered' && o.delivered_at) dateStr = PureSpec.formatDate(o.delivered_at);

    const cls = i < currentIdx ? 'is-done' : (i === currentIdx ? 'is-current' : '');
    return `<div class="progress-step ${cls}">
      <div class="progress-step-title">${sInfo.short}</div>
      <div class="progress-step-sub">${dateStr || sInfo.description || ''}</div>
    </div>`;
  }).join('');

  view.innerHTML = `
    <button class="btn btn-ghost btn-sm mb-6" onclick="backToList()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Mes commandes
    </button>

    <div class="order-detail">
      <div class="row-between mb-6" style="align-items:flex-start;">
        <div>
          <div class="order-num">${PureSpec.escapeHtml(o.order_number)}</div>
          <h2 class="title mt-2">${PureSpec.escapeHtml((o.marque||'') + ' ' + (o.modele||''))} <span class="muted" style="font-weight:400;">${PureSpec.escapeHtml(o.type_version || '')}</span></h2>
          <p class="muted mt-2">Commandé le ${PureSpec.formatDate(o.created_at)}</p>
        </div>
        <span class="badge ${info.badge}"><span class="badge-dot"></span>${info.short}</span>
      </div>

      <div class="detail-grid">
        <div>
          <div class="atelier-section-title" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;">Détails du sticker</div>
          <div class="info-block row-between"><span class="muted">Référence</span><span class="mono">${PureSpec.escapeHtml(o.reference)}</span></div>
          <div class="info-block row-between"><span class="muted">Marque & modèle</span><span>${PureSpec.escapeHtml((o.marque||'') + ' ' + (o.modele||''))}</span></div>
          <div class="info-block row-between"><span class="muted">Version</span><span>${PureSpec.escapeHtml(o.type_version || '—')}</span></div>
          <div class="info-block row-between"><span class="muted">Code moteur</span><span>${PureSpec.escapeHtml(o.moteur || '—')}</span></div>
          <div class="info-block row-between"><span class="muted">Couleur</span><span>${PureSpec.escapeHtml(o.nom_couleur || '—')}${o.code_couleur ? ' (' + PureSpec.escapeHtml(o.code_couleur) + ')' : ''}</span></div>
          ${o.instagram ? `<div class="info-block row-between"><span class="muted">Instagram</span><span>@${PureSpec.escapeHtml(o.instagram)}</span></div>` : ''}
          <div class="info-block row-between"><span class="muted">Quantité</span><span>${o.quantite}</span></div>
          <div class="info-block row-between"><span class="muted">Total</span><span style="font-weight:600;">${PureSpec.formatMoney(o.total_eur)}</span></div>

          <div class="atelier-section-title mt-8" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;">Livraison</div>
          <div class="card-soft">
            <div style="font-size:14px;line-height:1.6;">
              ${PureSpec.escapeHtml((o.prenom||'') + ' ' + (o.nom||''))}<br>
              ${PureSpec.escapeHtml(o.adresse || '')}${o.complement ? '<br>' + PureSpec.escapeHtml(o.complement) : ''}<br>
              ${PureSpec.escapeHtml((o.code_postal||'') + ' ' + (o.ville||''))}<br>
              ${PureSpec.escapeHtml(o.pays || '')}
            </div>
          </div>

          ${o.tracking_number ? `
          <div class="atelier-section-title mt-8" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;">Suivi</div>
          <div class="card-soft">
            <div class="row-between">
              <div>
                <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray);font-weight:600;">Numéro</div>
                <div class="mono mt-2" style="font-size:15px;">${PureSpec.escapeHtml(o.tracking_number)}</div>
              </div>
              ${o.tracking_carrier ? `<div class="muted">${PureSpec.escapeHtml(o.tracking_carrier)}</div>` : ''}
            </div>
          </div>
          ` : ''}
        </div>

        <aside>
          <div class="atelier-section-title" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;">Progression</div>
          <div class="progress-timeline">${timeline}</div>
        </aside>
      </div>
    </div>
  `;
}

function backToList() {
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('ordersView').style.display = '';
  window.history.pushState({}, '', '/account');
  loadOrders();
}

window.addEventListener('popstate', () => {
  const hash = window.location.hash;
  const orderMatch = hash.match(/^#order-(.+)$/);
  if (orderMatch) {
    loadOrderDetail(orderMatch[1]);
  } else {
    backToList();
  }
});

function switchTab(name) {
  document.querySelectorAll('.account-tab').forEach(t => t.classList.toggle('is-on', t.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('is-on', p.dataset.panel === name));
}

async function loadProfile() {
  try {
    const data = await PureSpec.apiRequest('/api/account/profile');
    const p = data.profile;
    if (!p) return;
    const form = document.getElementById('profileForm');
    if (p.prenom) form.prenom.value = p.prenom;
    if (p.nom) form.nom.value = p.nom;
    if (p.telephone) form.telephone.value = p.telephone;
    if (p.adresse) form.adresse.value = p.adresse;
    if (p.complement) form.complement.value = p.complement;
    if (p.code_postal) form.code_postal.value = p.code_postal;
    if (p.ville) form.ville.value = p.ville;
    if (p.pays) form.pays.value = p.pays;
    if (p.prenom) document.getElementById('userName').textContent = ', ' + p.prenom;
  } catch (_) {}
}

async function saveProfile(e) {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  const btn = e.target.querySelector('button[type="submit"]');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.innerHTML = '<span class="spinner spinner-light"></span><span>Enregistrement…</span>';
  try {
    await PureSpec.apiRequest('/api/account/profile', { method: 'PATCH', body: data });
    PureSpec.showToast('Profil mis à jour', 'success');
    if (data.prenom) document.getElementById('userName').textContent = ', ' + data.prenom;
  } catch (err) {
    PureSpec.showToast('Erreur : ' + err.message, 'danger');
  }
  btn.disabled = false;
  btn.textContent = orig;
}

async function logout() {
  await PureSpec.signOut();
  window.location.href = '/';
}

init();
</script>

<script>
  window.PURESPEC_CONFIG = {
    supabaseUrl: window.SUPABASE_URL || '__SUPABASE_URL__',
    supabaseAnonKey: window.SUPABASE_ANON_KEY || '__SUPABASE_ANON_KEY__'
  };
</script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/js/common.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/status.js"></script>

</body>
</html>
