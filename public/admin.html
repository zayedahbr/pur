<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — PureSpec</title>
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/modals.css">

<style>
  body { background: var(--bg); }

  .admin-header {
    background: #fff;
    border-bottom: 1px solid var(--line-soft);
    padding: 24px 0;
  }
  .admin-tabs {
    display: flex;
    gap: 28px;
    border-bottom: 1px solid var(--line-soft);
    margin: 24px 0 0;
    padding: 0 var(--container-x);
    max-width: var(--container-w);
    margin-left: auto;
    margin-right: auto;
  }
  .admin-tab {
    padding: 10px 0 14px;
    margin-bottom: -1px;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray);
    border-bottom: 2px solid transparent;
    transition: color var(--t-fast), border-color var(--t-fast);
    position: relative;
  }
  .admin-tab:hover { color: var(--ink); }
  .admin-tab.is-on { color: var(--ink); border-color: var(--ink); }
  .admin-tab .count {
    background: var(--bg);
    border-radius: var(--radius-full);
    padding: 1px 8px;
    font-size: 11px;
    margin-left: 6px;
    color: var(--ink-soft);
  }
  .admin-tab.is-on .count { background: var(--ink); color: #fff; }

  .panel { display: none; padding: 32px 0; }
  .panel.is-on { display: block; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: #fff;
    border-radius: var(--radius-md);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray);
  }
  .stat-value {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-top: 6px;
  }

  /* Filter row */
  .filter-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-row .input, .filter-row .select { width: auto; min-width: 160px; padding: 10px 14px; font-size: 14px; }

  /* Table */
  .data-table {
    width: 100%;
    background: #fff;
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    border-collapse: collapse;
  }
  .data-table th, .data-table td {
    padding: 14px 18px;
    text-align: left;
    border-bottom: 1px solid var(--line-faint);
    font-size: 14px;
  }
  .data-table th {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray);
    background: var(--bg);
  }
  .data-table tbody tr {
    cursor: pointer;
    transition: background var(--t-fast);
  }
  .data-table tbody tr:hover { background: var(--bg); }
  .data-table tbody tr:last-child td { border-bottom: 0; }

  @media (max-width: 760px) {
    .data-table thead { display: none; }
    .data-table tr { display: block; padding: 14px 18px; border-bottom: 1px solid var(--line-faint); }
    .data-table td { display: flex; justify-content: space-between; padding: 6px 0; border: 0; }
    .data-table td::before {
      content: attr(data-label);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray);
    }
  }

  /* Modal admin */
  .admin-modal-content { max-width: 720px; }
</style>
</head>
<body>

<div id="checking" style="text-align:center;padding:120px 20px;">
  <span class="spinner"></span>
  <p class="muted mt-4">Vérification…</p>
</div>

<div id="adminApp" style="display:none;">

  <header class="admin-header">
    <div class="container">
      <div class="row-between">
        <div>
          <div class="eyebrow">Back-office</div>
          <h1 class="title mt-2">Tableau de bord</h1>
        </div>
        <div class="row gap-3">
          <span class="muted" style="font-size:13px;" id="adminEmail"></span>
          <button class="btn btn-ghost btn-sm" onclick="logout()">Se déconnecter</button>
        </div>
      </div>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab is-on" data-tab="orders">Commandes <span class="count" id="countOrders">—</span></button>
      <button class="admin-tab" data-tab="messages">Messages <span class="count" id="countMessages">—</span></button>
    </div>
  </header>

  <!-- ===== COMMANDES ===== -->
  <div class="panel is-on" data-panel="orders">
    <div class="container">
      <div class="stats-row" id="statsRow"></div>

      <div class="filter-row">
        <input class="input" id="searchInput" type="text" placeholder="Rechercher (référence, email, nom...)" oninput="debouncedLoadOrders()">
        <select class="select" id="filterStatus" onchange="loadOrders()">
          <option value="all">Tous les statuts</option>
          <option value="pending">En attente</option>
          <option value="paid">Payée</option>
          <option value="in_production">En production</option>
          <option value="shipped">Expédiée</option>
          <option value="delivered">Livrée</option>
          <option value="cancelled">Annulée</option>
        </select>
      </div>

      <div id="ordersTable"></div>
    </div>
  </div>

  <!-- ===== MESSAGES ===== -->
  <div class="panel" data-panel="messages">
    <div class="container">
      <div class="filter-row">
        <select class="select" id="filterMessageStatus" onchange="loadMessages()">
          <option value="all">Tous</option>
          <option value="open" selected>À traiter</option>
          <option value="read">Lus</option>
          <option value="replied">Répondu</option>
          <option value="closed">Clos</option>
        </select>
      </div>
      <div id="messagesList"></div>
    </div>
  </div>

</div>

<!-- ===== MODAL DÉTAIL COMMANDE ===== -->
<div class="modal-overlay" id="orderModal">
  <div class="modal-content admin-modal-content" id="orderModalContent"></div>
</div>

<!-- ===== MODAL DÉTAIL MESSAGE ===== -->
<div class="modal-overlay" id="messageModal">
  <div class="modal-content admin-modal-content" id="messageModalContent"></div>
</div>

<script>
let currentTab = 'orders';

async function init() {
  await new Promise(r => setTimeout(r, 250));
  const user = await PureSpec.getCurrentUser();
  if (!user) { window.location.href = '/account/login'; return; }

  try {
    const data = await PureSpec.apiRequest('/api/admin?resource=me');
    if (!data.admin) throw new Error('Pas admin');
    document.getElementById('adminEmail').textContent = data.email;
  } catch (err) {
    alert("Accès refusé. Vous n'êtes pas administrateur.");
    window.location.href = '/account';
    return;
  }

  document.getElementById('checking').style.display = 'none';
  document.getElementById('adminApp').style.display = '';

  document.querySelectorAll('.admin-tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  loadOrders();
  loadMessages();
}

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('is-on', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('is-on', p.dataset.panel === name));
}

let _ordersDebounce;
function debouncedLoadOrders() {
  clearTimeout(_ordersDebounce);
  _ordersDebounce = setTimeout(loadOrders, 300);
}

async function loadOrders() {
  const statut = document.getElementById('filterStatus').value;
  const q = document.getElementById('searchInput').value;
  const params = new URLSearchParams();
  if (statut) params.set('statut', statut);
  if (q) params.set('q', q);

  const table = document.getElementById('ordersTable');
  table.innerHTML = '<div class="card text-center"><span class="spinner"></span></div>';

  try {
    const data = await PureSpec.apiRequest('/api/admin?resource=orders&' + params.toString());
    const orders = data.orders || [];

    // Stats
    const stats = data.stats || {};
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${stats.total || 0}</div></div>
      <div class="stat-card"><div class="stat-label">À produire</div><div class="stat-value">${(stats.paid || 0) + (stats.in_production || 0)}</div></div>
      <div class="stat-card"><div class="stat-label">Expédiées</div><div class="stat-value">${stats.shipped || 0}</div></div>
      <div class="stat-card"><div class="stat-label">Livrées</div><div class="stat-value">${stats.delivered || 0}</div></div>
      <div class="stat-card"><div class="stat-label">En attente</div><div class="stat-value">${stats.pending || 0}</div></div>
    `;
    document.getElementById('countOrders').textContent = stats.total || 0;

    if (orders.length === 0) {
      table.innerHTML = '<div class="card text-center"><p class="muted">Aucune commande</p></div>';
      return;
    }

    table.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>N° commande</th>
            <th>Client</th>
            <th>Sticker</th>
            <th>Référence</th>
            <th>Total</th>
            <th>Statut</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          ${orders.map(o => `
            <tr data-order-id="${o.id}">
              <td data-label="N°"><span class="mono">${PureSpec.escapeHtml(o.order_number)}</span></td>
              <td data-label="Client">${PureSpec.escapeHtml((o.prenom||'') + ' ' + (o.nom||''))}<br><span class="muted" style="font-size:12px;">${PureSpec.escapeHtml(o.email)}</span></td>
              <td data-label="Sticker">${PureSpec.escapeHtml((o.marque||'') + ' ' + (o.modele||''))}</td>
              <td data-label="Réf"><span class="mono">${PureSpec.escapeHtml(o.reference)}</span></td>
              <td data-label="Total">${PureSpec.formatMoney(o.total_eur)}</td>
              <td data-label="Statut">${PureSpecStatus.statusBadge(o.statut)}</td>
              <td data-label="Date"><span class="muted">${PureSpec.formatDate(o.created_at, {day:'2-digit',month:'short',year:'numeric'})}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    table.querySelectorAll('tbody tr').forEach(tr => {
      tr.addEventListener('click', () => openOrderDetail(tr.dataset.orderId));
    });

  } catch (err) {
    table.innerHTML = `<div class="card text-center"><p class="muted">Erreur : ${PureSpec.escapeHtml(err.message)}</p></div>`;
  }
}

async function openOrderDetail(orderId) {
  const modal = document.getElementById('orderModal');
  const content = document.getElementById('orderModalContent');
  content.innerHTML = '<div style="padding:60px;text-align:center;"><span class="spinner"></span></div>';
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';

  try {
    const data = await PureSpec.apiRequest('/api/admin?resource=order&id=' + orderId);
    const o = data.order;
    const events = data.events || [];

    content.innerHTML = `
      <div style="padding:24px 28px 16px;">
        <div class="modal-header">
          <div>
            <div class="eyebrow">${PureSpec.escapeHtml(o.order_number)}</div>
            <h3 class="title mt-2">${PureSpec.escapeHtml((o.marque||'') + ' ' + (o.modele||''))} <span class="muted" style="font-weight:400;">${PureSpec.escapeHtml(o.type_version || '')}</span></h3>
            <p class="muted mt-2" style="font-size:13px;">Référence <span class="mono">${PureSpec.escapeHtml(o.reference)}</span> · ${PureSpec.formatDateTime(o.created_at)}</p>
          </div>
          <button class="modal-close" onclick="closeOrderModal()" aria-label="Fermer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div style="padding:0 28px;">
        <div class="card-soft">
          <div class="row-between"><span class="muted">Client</span><span>${PureSpec.escapeHtml((o.prenom||'') + ' ' + (o.nom||''))}</span></div>
          <div class="row-between mt-2"><span class="muted">Email</span><span>${PureSpec.escapeHtml(o.email)}</span></div>
          ${o.telephone ? `<div class="row-between mt-2"><span class="muted">Téléphone</span><span>${PureSpec.escapeHtml(o.telephone)}</span></div>` : ''}
          <div class="row-between mt-2"><span class="muted">Adresse</span><span style="text-align:right;">${PureSpec.escapeHtml(o.adresse||'')}${o.complement ? ', ' + PureSpec.escapeHtml(o.complement) : ''}<br>${PureSpec.escapeHtml((o.code_postal||'') + ' ' + (o.ville||''))}<br>${PureSpec.escapeHtml(o.pays||'')}</span></div>
          <div class="row-between mt-2"><span class="muted">Quantité</span><span>${o.quantite}</span></div>
          <div class="row-between mt-2"><span class="muted">Total payé</span><span style="font-weight:600;">${PureSpec.formatMoney(o.total_eur)}</span></div>
        </div>

        <div class="atelier-section-title mt-6" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;">Sticker</div>
        <div class="card-soft">
          <div class="row-between"><span class="muted">Couleur</span><span>${PureSpec.escapeHtml(o.nom_couleur||'')} (${PureSpec.escapeHtml(o.code_couleur||'')})</span></div>
          <div class="row-between mt-2"><span class="muted">Moteur</span><span>${PureSpec.escapeHtml(o.moteur||'—')}</span></div>
          ${o.instagram ? `<div class="row-between mt-2"><span class="muted">Instagram</span><span>@${PureSpec.escapeHtml(o.instagram)}</span></div>` : ''}
          <div class="row-between mt-2"><span class="muted">Fond</span><span class="mono">${PureSpec.escapeHtml(o.bg_color||'')}</span></div>
          <div class="row-between mt-2"><span class="muted">Circuit</span><span>Motif ${o.circuit_motif} · ${PureSpec.escapeHtml((o.circuit_color||'').toUpperCase())} · ${Math.round((o.circuit_opacity||0)*100)}%</span></div>
          <div class="row-between mt-2"><span class="muted">Texte</span><span>${o.txt_mode === 'black' ? 'Noir' : 'Blanc'}</span></div>
        </div>

        <div class="atelier-section-title mt-6" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;">Statut & expédition</div>
        <form onsubmit="saveOrder(event, '${o.id}')">
          <div class="field">
            <label class="label">Statut</label>
            <select class="select" name="statut">
              <option value="pending" ${o.statut==='pending'?'selected':''}>En attente de paiement</option>
              <option value="paid" ${o.statut==='paid'?'selected':''}>Payée</option>
              <option value="in_production" ${o.statut==='in_production'?'selected':''}>En production</option>
              <option value="shipped" ${o.statut==='shipped'?'selected':''}>Expédiée</option>
              <option value="delivered" ${o.statut==='delivered'?'selected':''}>Livrée</option>
              <option value="cancelled" ${o.statut==='cancelled'?'selected':''}>Annulée</option>
            </select>
            <p class="hint">Passer à "Expédiée" déclenche l'email avec le numéro de suivi.</p>
          </div>
          <div class="grid-2 mt-4">
            <div class="field" style="margin-top:0;">
              <label class="label">N° de suivi</label>
              <input class="input mono" name="tracking_number" value="${PureSpec.escapeHtml(o.tracking_number||'')}">
            </div>
            <div class="field" style="margin-top:0;">
              <label class="label">Transporteur</label>
              <input class="input" name="tracking_carrier" value="${PureSpec.escapeHtml(o.tracking_carrier||'')}" placeholder="La Poste, Mondial Relay…">
            </div>
          </div>
          <div class="field mt-4">
            <label class="label">Notes internes</label>
            <textarea class="textarea" name="admin_notes" rows="3">${PureSpec.escapeHtml(o.admin_notes||'')}</textarea>
          </div>

          <div style="background:var(--bg);padding:18px 28px;margin:24px -28px 0;">
            <button class="btn btn-primary btn-block" type="submit">Enregistrer</button>
          </div>
        </form>

        ${events.length ? `
          <div class="atelier-section-title mt-6" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;">Historique</div>
          <div class="card-soft mb-6" style="font-size:13px;">
            ${events.map(e => `
              <div style="padding:8px 0;border-bottom:1px solid var(--line-faint);">
                <div style="font-weight:600;">${PureSpec.escapeHtml(e.message || e.event_type)}</div>
                <div class="muted" style="font-size:11px;margin-top:2px;">${PureSpec.formatDateTime(e.created_at)}</div>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    `;
  } catch (err) {
    content.innerHTML = `<div style="padding:40px;text-align:center;"><p class="muted">Erreur : ${PureSpec.escapeHtml(err.message)}</p><button class="btn btn-ghost mt-4" onclick="closeOrderModal()">Fermer</button></div>`;
  }
}

function closeOrderModal() {
  document.getElementById('orderModal').classList.remove('show');
  document.body.style.overflow = '';
}

async function saveOrder(e, id) {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  const btn = e.target.querySelector('button[type="submit"]');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.innerHTML = '<span class="spinner spinner-light"></span><span>Enregistrement…</span>';
  try {
    await PureSpec.apiRequest('/api/admin?resource=order&id=' + id, { method: 'PATCH', body: data });
    PureSpec.showToast('Commande mise à jour', 'success');
    closeOrderModal();
    loadOrders();
  } catch (err) {
    PureSpec.showToast('Erreur : ' + err.message, 'danger');
    btn.disabled = false;
    btn.textContent = orig;
  }
}

/* ============== MESSAGES ============== */
async function loadMessages() {
  const statut = document.getElementById('filterMessageStatus').value;
  const list = document.getElementById('messagesList');
  list.innerHTML = '<div class="card text-center"><span class="spinner"></span></div>';

  try {
    const data = await PureSpec.apiRequest('/api/admin?resource=messages&statut=' + statut);
    const msgs = data.messages || [];
    document.getElementById('countMessages').textContent = msgs.filter(m => m.statut === 'open').length;

    if (msgs.length === 0) {
      list.innerHTML = '<div class="card text-center"><p class="muted">Aucun message</p></div>';
      return;
    }

    list.innerHTML = `
      <table class="data-table">
        <thead><tr><th>Ticket</th><th>De</th><th>Sujet</th><th>Statut</th><th>Date</th></tr></thead>
        <tbody>
          ${msgs.map(m => `
            <tr data-msg-id="${m.id}">
              <td data-label="Ticket"><span class="mono">${PureSpec.escapeHtml(m.ticket_number)}</span></td>
              <td data-label="De">${PureSpec.escapeHtml((m.prenom||'') + ' ' + (m.nom||''))}<br><span class="muted" style="font-size:12px;">${PureSpec.escapeHtml(m.email)}</span></td>
              <td data-label="Sujet">${PureSpec.escapeHtml(m.sujet || '(sans sujet)')}</td>
              <td data-label="Statut">${messageStatusBadge(m.statut)}</td>
              <td data-label="Date"><span class="muted">${PureSpec.formatDate(m.created_at)}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    list.querySelectorAll('tbody tr').forEach(tr => {
      tr.addEventListener('click', () => openMessageDetail(tr.dataset.msgId, msgs));
    });
  } catch (err) {
    list.innerHTML = `<div class="card text-center"><p class="muted">Erreur : ${PureSpec.escapeHtml(err.message)}</p></div>`;
  }
}

function messageStatusBadge(s) {
  const map = {
    open: { label: 'À traiter', cls: 'badge-warning' },
    read: { label: 'Lu', cls: 'badge-info' },
    replied: { label: 'Répondu', cls: 'badge-success' },
    closed: { label: 'Clos', cls: 'badge-neutral' }
  };
  const i = map[s] || { label: s, cls: 'badge-neutral' };
  return `<span class="badge ${i.cls}"><span class="badge-dot"></span>${i.label}</span>`;
}

function openMessageDetail(id, list) {
  const m = list.find(x => x.id === id);
  if (!m) return;
  const modal = document.getElementById('messageModal');
  const content = document.getElementById('messageModalContent');
  content.innerHTML = `
    <div style="padding:24px 28px 16px;">
      <div class="modal-header">
        <div>
          <div class="eyebrow">${PureSpec.escapeHtml(m.ticket_number)}</div>
          <h3 class="title mt-2">${PureSpec.escapeHtml(m.sujet || 'Message sans sujet')}</h3>
          <p class="muted mt-2" style="font-size:13px;">De ${PureSpec.escapeHtml((m.prenom||'') + ' ' + (m.nom||''))} &lt;${PureSpec.escapeHtml(m.email)}&gt; · ${PureSpec.formatDateTime(m.created_at)}</p>
        </div>
        <button class="modal-close" onclick="closeMessageModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>
    <div style="padding:0 28px;">
      ${m.reference_commande ? `<div class="card-soft mb-4">Réf commande : <span class="mono">${PureSpec.escapeHtml(m.reference_commande)}</span></div>` : ''}
      <div class="card-soft" style="white-space:pre-wrap;line-height:1.55;font-size:14px;">${PureSpec.escapeHtml(m.message)}</div>

      <div class="atelier-section-title mt-6" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;">Actions</div>
      <div class="row gap-2" style="flex-wrap:wrap;">
        <a class="btn btn-secondary btn-sm" href="mailto:${PureSpec.escapeHtml(m.email)}?subject=Re: ${PureSpec.escapeHtml(m.sujet || m.ticket_number)}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3,7 12,13 21,7"/><path d="M3 5h18v14H3z"/></svg>
          Répondre par email
        </a>
        <button class="btn btn-outline btn-sm" onclick="updateMessage('${m.id}', 'read')">Marquer lu</button>
        <button class="btn btn-outline btn-sm" onclick="updateMessage('${m.id}', 'replied')">Marquer répondu</button>
        <button class="btn btn-outline btn-sm" onclick="updateMessage('${m.id}', 'closed')">Clore</button>
      </div>
    </div>
    <div style="height:24px;"></div>
  `;
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeMessageModal() {
  document.getElementById('messageModal').classList.remove('show');
  document.body.style.overflow = '';
}

async function updateMessage(id, statut) {
  try {
    await PureSpec.apiRequest('/api/admin?resource=message&id=' + id, { method: 'PATCH', body: { statut } });
    PureSpec.showToast('Mis à jour', 'success');
    closeMessageModal();
    loadMessages();
  } catch (err) {
    PureSpec.showToast('Erreur : ' + err.message, 'danger');
  }
}

// Fermer modaux au clic sur overlay + Escape
document.getElementById('orderModal').addEventListener('click', e => { if (e.target.id === 'orderModal') closeOrderModal(); });
document.getElementById('messageModal').addEventListener('click', e => { if (e.target.id === 'messageModal') closeMessageModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeOrderModal(); closeMessageModal(); }
});

async function logout() {
  await PureSpec.signOut();
  window.location.href = '/';
}

init();
</script>

  };
</script>
